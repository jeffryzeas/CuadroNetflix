<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Book Studio - Edición Profesional Imprenta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@300;400;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; }
        .book-font { font-family: 'Crimson Pro', serif; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .page-preview {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
            background: white;
            min-height: 800px;
            border-radius: 4px;
        }
        .editable-content:focus {
            outline: none;
            background: #fcfcfd;
            box-shadow: inset 0 0 0 2px #e2e8f0;
            padding: 10px;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-5xl font-extrabold text-slate-900 mb-2">AI Book Studio</h1>
            <p class="text-slate-500 text-lg">Escribe, diseña y maqueta tu libro listo para imprenta</p>
        </header>

        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 mb-10">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Título del Libro</label>
                    <input type="text" id="bookTitle" placeholder="Ej: Sombras del Mañana" 
                           class="w-full p-4 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Nombre del Autor</label>
                    <input type="text" id="bookAuthor" placeholder="Ej: IA Autor o Tu Nombre" 
                           class="w-full p-4 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 outline-none transition-all">
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Dedicatoria (Opcional)</label>
                    <input type="text" id="bookDedication" placeholder="Ej: Para aquellos que miran las estrellas..." 
                           class="w-full p-4 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Imagen de Portada</label>
                    <div class="flex gap-2">
                        <label class="flex-1 flex items-center justify-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-4 px-4 rounded-xl cursor-pointer transition-all border-2 border-dashed border-slate-300">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                            <span>Subir Propia</span>
                            <input type="file" id="imageUpload" class="hidden" accept="image/*" onchange="handleImageUpload(event)">
                        </label>
                        <button onclick="generateCover()" id="btnCoverIA" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold py-4 px-6 rounded-xl transition-all">
                            IA ✨
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="mt-8 flex flex-wrap gap-4 justify-center">
                <button onclick="generateBookContent()" id="btnGenerate" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-2xl shadow-lg transition-all transform hover:-translate-y-1">
                    1. Generar Contenido (Groq)
                </button>
                <button onclick="downloadPDF()" id="btnPDF" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 px-10 rounded-2xl shadow-lg transition-all hidden transform hover:-translate-y-1">
                    2. Descargar PDF Editorial
                </button>
            </div>
        </div>

        <div id="statusMessage" class="hidden mb-8 p-4 rounded-xl bg-indigo-50 text-indigo-800 text-center font-semibold border border-indigo-100">
            <div class="loader mr-3"></div> <span id="statusText">Procesando...</span>
        </div>

        <div id="bookPreview" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-4">
                <h3 class="font-bold text-slate-400 uppercase text-xs tracking-widest">Capítulos Generados</h3>
                <div id="chapterList" class="space-y-3"></div>
            </div>

            <div class="lg:col-span-8">
                <div id="pdfContent" class="page-preview p-12 md:p-20 book-font text-slate-900 leading-relaxed relative border border-slate-200">
                    <div id="coverView" class="flex flex-col items-center justify-center text-center min-h-[600px]">
                        <div id="coverImageContainer" class="w-full max-w-sm mb-12 rounded-lg shadow-2xl overflow-hidden bg-slate-50 aspect-[2/3] flex items-center justify-center border border-slate-200">
                            <span class="text-slate-400 italic">Sube una imagen o usa la IA</span>
                        </div>
                        <h1 id="previewTitle" contenteditable="true" class="text-5xl font-bold mb-4 text-slate-900 focus:outline-none">Título del Libro</h1>
                        <p id="previewAuthor" class="text-xl italic text-slate-400">Por Autor IA</p>
                    </div>
                    
                    <div id="contentView" class="hidden">
                        <h2 id="chapterTitle" contenteditable="true" class="text-4xl font-bold mb-8 border-b-2 border-slate-100 pb-4 text-slate-800 focus:outline-none">Título del Capítulo</h2>
                        <div id="chapterBody" contenteditable="true" class="editable-content text-xl whitespace-pre-wrap text-justify min-h-[500px]">
                            Haz clic aquí para escribir o editar el texto generado...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GROQ_API_KEY = "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"; // REEMPLAZA CON TU KEY
        const IMAGEN_API_KEY = ""; 
        
        let bookData = {
            title: "",
            author: "",
            dedication: "",
            chapters: [],
            coverUrl: "",
            currentChapterIndex: -1
        };

        const { jsPDF } = window.jspdf;

        async function fetchGroq(prompt, system = "Eres un autor galardonado que escribe con profundidad y detalle.") {
            const url = "https://api.groq.com/openai/v1/chat/completions";
            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: system },
                            { role: "user", content: prompt }
                        ],
                        temperature: 0.7
                    })
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error("Groq Error:", error);
                throw new Error("No se pudo conectar con la IA.");
            }
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    bookData.coverUrl = e.target.result;
                    const container = document.getElementById('coverImageContainer');
                    container.innerHTML = `<img src="${bookData.coverUrl}" class="w-full h-full object-cover">`;
                    showCover();
                    showStatus("¡Imagen subida correctamente!");
                    setTimeout(hideStatus, 2000);
                };
                reader.readAsDataURL(file);
            }
        }

        async function generateBookContent() {
            const titleInput = document.getElementById('bookTitle').value || "Libro Sin Título";
            const authorInput = document.getElementById('bookAuthor').value || "Autor Desconocido";
            bookData.dedication = document.getElementById('bookDedication').value;

            bookData.title = titleInput;
            bookData.author = authorInput;
            
            document.getElementById('previewTitle').innerText = bookData.title;
            document.getElementById('previewAuthor').innerText = "Por " + bookData.author;

            showStatus("Groq está diseñando la estructura de tu libro...");

            try {
                const schemaPrompt = `Genera un índice de 5 capítulos para un libro titulado "${bookData.title}". Solo los nombres de los capítulos, uno por línea, sin números.`;
                const schemaRaw = await fetchGroq(schemaPrompt);
                
                const lines = schemaRaw.split('\n').filter(l => l.trim().length > 0);
                bookData.chapters = lines.slice(0, 5).map(line => ({
                    title: line.trim().replace(/^\d+[\.\)\-\s]+/, ''),
                    content: "Generando contenido detallado..."
                }));

                renderChapters();
                document.getElementById('bookPreview').classList.remove('hidden');
                
                // Generar el primer capítulo para mostrar algo
                await generateChapterContent(0);
                
                document.getElementById('btnPDF').classList.remove('hidden');
                hideStatus();
            } catch (error) {
                showStatus("Error al generar: " + error.message);
            }
        }

        async function generateChapterContent(index) {
            bookData.currentChapterIndex = index;
            showStatus(`Redactando: ${bookData.chapters[index].title}...`);
            
            const prompt = `Escribe el capítulo completo titulado "${bookData.chapters[index].title}" para el libro "${bookData.title}". Usa un lenguaje rico, párrafos bien estructurados y diálogos si es necesario. Mínimo 800 palabras. Idioma: Español.`;
            try {
                const content = await fetchGroq(prompt);
                bookData.chapters[index].content = content;
                selectChapter(index);
                hideStatus();
            } catch (error) {
                showStatus("Error al redactar capítulo.");
            }
        }

        // Listeners de edición manual
        document.getElementById('chapterBody').addEventListener('input', (e) => {
            if (bookData.currentChapterIndex >= 0) bookData.chapters[bookData.currentChapterIndex].content = e.target.innerText;
        });
        document.getElementById('chapterTitle').addEventListener('input', (e) => {
            if (bookData.currentChapterIndex >= 0) {
                bookData.chapters[bookData.currentChapterIndex].title = e.target.innerText;
                renderChapters();
            }
        });
        document.getElementById('previewTitle').addEventListener('input', (e) => bookData.title = e.target.innerText);

        function renderChapters() {
            const list = document.getElementById('chapterList');
            list.innerHTML = `
                <div onclick="showCover()" class="p-4 bg-indigo-600 text-white rounded-xl cursor-pointer hover:bg-indigo-700 transition shadow-md font-bold flex items-center justify-between">
                    <span>Ir a Portada</span>
                </div>
            `;
            bookData.chapters.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = "p-4 bg-white border border-slate-200 rounded-xl cursor-pointer hover:border-indigo-400 transition text-sm font-medium flex justify-between items-center group shadow-sm";
                div.innerHTML = `
                    <span class="truncate pr-2">${i+1}. ${ch.title}</span>
                    <button onclick="event.stopPropagation(); generateChapterContent(${i})" class="opacity-0 group-hover:opacity-100 text-[10px] bg-indigo-50 text-indigo-600 px-2 py-1 rounded-md uppercase font-bold transition">Reescribir</button>
                `;
                div.onclick = () => selectChapter(i);
                list.appendChild(div);
            });
        }

        function selectChapter(i) {
            bookData.currentChapterIndex = i;
            document.getElementById('coverView').classList.add('hidden');
            document.getElementById('contentView').classList.remove('hidden');
            document.getElementById('chapterTitle').innerText = bookData.chapters[i].title;
            document.getElementById('chapterBody').innerText = bookData.chapters[i].content;
        }

        function showCover() {
            bookData.currentChapterIndex = -1;
            document.getElementById('coverView').classList.remove('hidden');
            document.getElementById('contentView').classList.add('hidden');
        }

        async function generateCover() {
            // Tu lógica de Imagen 4.0 se mantiene igual
            showStatus("Imagen 4.0 está diseñando tu portada...");
            const prompt = `Professional book cover for "${bookData.title}". Cinematic, artistic illustration, high definition, elegant style, center focused, no text.`;
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${IMAGEN_API_KEY}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ instances: [{ prompt: prompt }], parameters: { sampleCount: 1 }})
                });
                const result = await response.json();
                const base64 = result.predictions[0].bytesBase64Encoded;
                bookData.coverUrl = `data:image/png;base64,${base64}`;
                const container = document.getElementById('coverImageContainer');
                container.innerHTML = `<img src="${bookData.coverUrl}" class="w-full h-full object-cover">`;
                showCover();
                showStatus("¡Portada generada con éxito!");
                setTimeout(hideStatus, 2000);
            } catch (e) {
                showStatus("Error al generar imagen. Prueba subiendo una.");
            }
        }

        // ==========================================
        // NUEVA FUNCIÓN DE MAQUETACIÓN PARA IMPRENTA
        // ==========================================
        function downloadPDF() {
            showStatus("Maquetando PDF para imprenta... por favor espera.");
            
            // Tamaño A5 (148 x 210 mm) estándar de novelas
            const doc = new jsPDF({ unit: 'mm', format: 'a5' });
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            let pageNum = 1;

            // Configuración de Márgenes Editorial (Gutter)
            const marginTop = 20;
            const marginBottom = 20;
            const marginInner = 22; // Margen más ancho para la encuadernación/pegado
            const marginOuter = 14; // Margen exterior más estrecho

            // Helper para obtener márgenes según si es página par o impar
            const getMargins = (page) => {
                const isOdd = page % 2 !== 0; // Impares son páginas derechas
                return {
                    left: isOdd ? marginInner : marginOuter,
                    right: isOdd ? marginOuter : marginInner,
                    width: pageWidth - marginInner - marginOuter
                };
            };

            const addPageNumber = (d, num) => {
                const m = getMargins(num);
                d.setFontSize(9);
                d.setTextColor(100);
                // Número centrado en la página
                d.text(`${num}`, pageWidth / 2, pageHeight - 12, { align: 'center' });
            };

            const addNewPage = () => {
                doc.addPage();
                pageNum++;
            };

            // 1. PORTADA EXTERIOR (Pág 1 - Impar/Derecha)
            if (bookData.coverUrl) {
                doc.addImage(bookData.coverUrl, 'PNG', 0, 0, pageWidth, pageHeight);
                doc.setFillColor(0, 0, 0, 0.7);
                doc.rect(0, pageHeight - 40, pageWidth, 40, 'F');
                doc.setTextColor(255);
                doc.setFontSize(22);
                doc.text(bookData.title.toUpperCase(), pageWidth / 2, pageHeight - 22, { align: 'center' });
                doc.setFontSize(12);
                doc.text(bookData.author.toUpperCase(), pageWidth / 2, pageHeight - 12, { align: 'center' });
            } else {
                doc.setFontSize(24);
                doc.text(bookData.title, pageWidth / 2, pageHeight / 2, { align: 'center' });
            }

            // 2. PÁGINA EN BLANCO (Pág 2 - Par/Izquierda - Reverso de portada)
            addNewPage();

            // 3. PORTADILLA (Pág 3 - Impar/Derecha)
            addNewPage();
            doc.setTextColor(0);
            doc.setFont("times", "bold");
            doc.setFontSize(28);
            const splitTitle = doc.splitTextToSize(bookData.title.toUpperCase(), getMargins(pageNum).width);
            doc.text(splitTitle, pageWidth / 2, pageHeight / 3, { align: 'center' });
            
            doc.setFont("times", "normal");
            doc.setFontSize(14);
            doc.text(bookData.author, pageWidth / 2, pageHeight / 3 + 30, { align: 'center' });
            doc.setFontSize(10);
            doc.text("AI Book Studio Press", pageWidth / 2, pageHeight - 30, { align: 'center' });

            // 4. PÁGINA LEGAL / COPYRIGHT (Pág 4 - Par/Izquierda)
            addNewPage();
            doc.setFontSize(9);
            doc.setTextColor(80);
            const mLegal = getMargins(pageNum);
            const year = new Date().getFullYear();
            doc.text(`© ${year} ${bookData.author}`, mLegal.left, pageHeight - 80);
            doc.text("Todos los derechos reservados.", mLegal.left, pageHeight - 75);
            doc.text("Ninguna parte de esta publicación puede ser reproducida,", mLegal.left, pageHeight - 65);
            doc.text("distribuida o transmitida de ninguna forma ni por ningún medio.", mLegal.left, pageHeight - 60);
            doc.text("ISBN: 978-X-XXXXXXX-X-X", mLegal.left, pageHeight - 50);
            doc.text("Impreso en la Tierra.", mLegal.left, pageHeight - 45);

            // 5. DEDICATORIA (Pág 5 - Impar/Derecha)
            if (bookData.dedication) {
                addNewPage();
                doc.setFont("times", "italic");
                doc.setFontSize(12);
                const splitDedication = doc.splitTextToSize(bookData.dedication, getMargins(pageNum).width - 20);
                doc.text(splitDedication, pageWidth / 2, pageHeight / 2 - 20, { align: 'center' });
                addNewPage(); // Pág 6 Blanca para que el índice empiece en impar
            } else {
                addNewPage(); // Pág 5 Blanca
                addNewPage(); // Pág 6 Blanca
            }

            // 7. ÍNDICE (Pág 7 - Impar/Derecha)
            addNewPage();
            const mToc = getMargins(pageNum);
            doc.setFont("times", "bold");
            doc.setFontSize(18);
            doc.setTextColor(0);
            doc.text("ÍNDICE", mToc.left, 40);
            
            doc.setFont("times", "normal");
            doc.setFontSize(12);
            let yToc = 60;
            bookData.chapters.forEach((ch, idx) => {
                doc.text(`Capítulo ${idx + 1}: ${ch.title}`, mToc.left, yToc);
                yToc += 10;
            });
            
            // Pág 8 Blanca (reverso del índice)
            addNewPage();

            // CAPÍTULOS (Inician en Pág 9)
            doc.setTextColor(20); // Gris muy oscuro para impresión
            
            bookData.chapters.forEach((ch, idx) => {
                // Forzar que cada capítulo empiece en página impar (Derecha)
                if (pageNum % 2 === 0) addNewPage();
                
                const mCh = getMargins(pageNum);
                
                // Título del capítulo (A media página)
                doc.setFont("times", "bold");
                doc.setFontSize(22);
                doc.text(`Capítulo ${idx + 1}`, mCh.left, 50);
                doc.setFontSize(16);
                doc.setFont("times", "italic");
                doc.text(`${ch.title}`, mCh.left, 60);
                
                doc.setFont("times", "normal");
                doc.setFontSize(11);
                
                // Procesar el texto dividiéndolo en párrafos
                const paragraphs = ch.content.split('\n').filter(p => p.trim() !== '');
                let y = 80; // Donde empieza el texto en la primera página del cap

                paragraphs.forEach((para) => {
                    const m = getMargins(pageNum); // Recalcular márgenes por si cambiamos de página
                    
                    // jsPDF splitTextToSize no justifica automáticamente, usamos justify
                    const lines = doc.splitTextToSize(para.trim(), m.width);
                    
                    lines.forEach(line => {
                        // Salto de página
                        if (y > pageHeight - marginBottom) {
                            addPageNumber(doc, pageNum);
                            addNewPage();
                            const newM = getMargins(pageNum);
                            y = marginTop;
                            
                            // Imprimir encabezado pequeño
                            doc.setFontSize(8);
                            doc.setTextColor(150);
                            if (pageNum % 2 === 0) {
                                doc.text(bookData.author.toUpperCase(), newM.left, marginTop - 8);
                            } else {
                                doc.text(bookData.title.toUpperCase(), pageWidth - newM.right, marginTop - 8, {align: 'right'});
                            }
                            doc.setFontSize(11);
                            doc.setTextColor(20);
                        }
                        
                        // Imprimir línea (justificada excepto la última del párrafo)
                        const currentM = getMargins(pageNum);
                        doc.text(line, currentM.left, y, { align: 'justify', maxWidth: currentM.width });
                        y += 6; // Interlineado
                    });
                    
                    y += 3; // Espacio entre párrafos
                });
                
                addPageNumber(doc, pageNum);
                addNewPage();
            });

            doc.save(`${bookData.title.replace(/\s+/g, '_')}_Imprenta.pdf`);
            showStatus("¡Maquetación completada! PDF descargado.");
            setTimeout(hideStatus, 3000);
        }

        function showStatus(text) {
            const banner = document.getElementById('statusMessage');
            banner.classList.remove('hidden');
            document.getElementById('statusText').innerText = text;
        }

        function hideStatus() {
            document.getElementById('statusMessage').classList.add('hidden');
        }
    </script>
</body>
</html>

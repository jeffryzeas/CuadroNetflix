<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Book Studio - Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@300;400;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #0f172a; }
        .book-font { font-family: 'Crimson Pro', serif; }
        .loader {
            border: 3px solid #e2e8f0; border-top: 3px solid #2563eb; border-radius: 50%;
            width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .page-preview {
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
            background: white; min-height: 800px; border-radius: 4px;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-5xl font-extrabold text-slate-900 mb-2 tracking-tight">AI Book Studio <span class="text-blue-600">Pro</span></h1>
            <p class="text-slate-600 text-lg">Maquetación editorial completa, desde la portada hasta el código de barras.</p>
        </header>

        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <h2 class="text-xl font-bold mb-6 border-b pb-2">1. Metadatos del Libro</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Título</label>
                    <input type="text" id="bookTitle" class="w-full p-3 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Autor</label>
                    <input type="text" id="bookAuthor" class="w-full p-3 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Género Literario</label>
                    <select id="bookGenre" class="w-full p-3 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
                        <option value="Novela de Ficción">Novela de Ficción</option>
                        <option value="Ciencia Ficción">Ciencia Ficción</option>
                        <option value="Fantasía">Fantasía</option>
                        <option value="Thriller / Misterio">Thriller / Misterio</option>
                        <option value="Desarrollo Personal">Desarrollo Personal</option>
                        <option value="Negocios">Negocios</option>
                    </select>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Dedicatoria (Opcional)</label>
                    <input type="text" id="bookDedication" class="w-full p-3 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Biografía del Autor (Para contraportada)</label>
                    <input type="text" id="bookBio" placeholder="Breve reseña sobre ti..." class="w-full p-3 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Imagen de Portada (Obligatorio)</label>
                <label class="flex items-center justify-center gap-2 bg-slate-50 hover:bg-slate-100 text-slate-700 font-semibold py-8 px-4 rounded-xl cursor-pointer transition-all border-2 border-dashed border-slate-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    <span id="uploadText">Subir archivo de imagen (JPG/PNG)</span>
                    <input type="file" id="imageUpload" class="hidden" accept="image/*" onchange="handleImageUpload(event)">
                </label>
            </div>
            
            <button onclick="planBook()" id="btnPlan" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 px-10 rounded-xl shadow-md transition-all">
                Generar Estructura del Libro
            </button>
        </div>

        <div id="statusMessage" class="hidden mb-8 p-4 rounded-xl bg-blue-50 text-blue-800 text-center font-bold border border-blue-200">
            <div class="loader mr-3"></div> <span id="statusText">Procesando...</span>
        </div>

        <div id="bookPreview" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-4">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <h3 class="font-bold text-slate-800 mb-4 border-b pb-2">Contenido Generado</h3>
                    <div id="chapterList" class="space-y-2 mb-6"></div>
                    
                    <button onclick="generateAllText()" id="btnGenText" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg mb-3 transition-all">
                        Escribir Todo el Contenido (IA)
                    </button>
                    <button onclick="downloadPDF()" id="btnPDF" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-lg transition-all hidden">
                        Exportar PDF Imprenta (A5)
                    </button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div id="pdfContent" class="page-preview p-12 md:p-20 book-font text-slate-900 leading-relaxed border border-slate-200">
                    <div id="contentView">
                        <h2 id="chapterTitle" contenteditable="true" class="text-4xl font-bold mb-8 border-b-2 border-slate-100 pb-4 focus:outline-none">Configura tu libro a la izquierda</h2>
                        <div id="chapterBody" contenteditable="true" class="text-xl whitespace-pre-wrap text-justify min-h-[500px] focus:outline-none">
                            Los textos generados aparecerán aquí para que los revises y edites antes de compilar el PDF final.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <img id="barcodeCanvas" class="hidden">

    <script>
        // CLAVE DE GROQ CONFIGURADA DIRECTAMENTE
        const GROQ_API_KEY = "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";
        
        let bookData = {
            title: "", author: "", genre: "", dedication: "", bio: "",
            synopsis: "", prologue: "", epilogue: "", chapters: [],
            coverUrl: "", isbn: ""
        };

        const { jsPDF } = window.jspdf;

        // Función base de conexión con Groq
        async function fetchGroq(prompt, system = "Eres un escritor profesional y editor literario.") {
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: system }, { role: "user", content: prompt }],
                        temperature: 0.6
                    })
                });
                const data = await response.json();
                return data.choices[0].message.content.trim();
            } catch (error) {
                console.error("Groq Error:", error);
                throw new Error("Fallo en la conexión con la IA.");
            }
        }

        // 1. Manejo de la Portada Local
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    bookData.coverUrl = e.target.result;
                    document.getElementById('uploadText').innerText = "¡Imagen cargada con éxito! (" + file.name + ")";
                    document.getElementById('uploadText').classList.add('text-emerald-600');
                };
                reader.readAsDataURL(file);
            }
        }

        // 2. Planificar la estructura (Sinopsis y Títulos)
        async function planBook() {
            bookData.title = document.getElementById('bookTitle').value || "Sin Título";
            bookData.author = document.getElementById('bookAuthor').value || "Anónimo";
            bookData.genre = document.getElementById('bookGenre').value;
            bookData.dedication = document.getElementById('bookDedication').value;
            bookData.bio = document.getElementById('bookBio').value || "Autor independiente.";
            
            // Generar ISBN Falso
            bookData.isbn = "978" + Math.floor(Math.random() * 9000000000 + 1000000000).toString();
            JsBarcode("#barcodeCanvas", bookData.isbn, { format: "EAN13", displayValue: true, width: 2, height: 50 });

            showStatus("Ideando la estructura y sinopsis comercial...");

            try {
                const prompt = `Crea un índice de 5 capítulos y una sinopsis comercial breve (máximo 80 palabras) para un libro llamado "${bookData.title}", género: ${bookData.genre}. 
                Formato de respuesta EXACTO:
                SINOPSIS: [Texto de la sinopsis]
                1. [Nombre del cap 1]
                2. [Nombre del cap 2]
                3. [Nombre del cap 3]
                4. [Nombre del cap 4]
                5. [Nombre del cap 5]`;

                const raw = await fetchGroq(prompt);
                
                // Parsear respuesta
                const lines = raw.split('\n');
                let synopsisText = "";
                bookData.chapters = [];

                lines.forEach(line => {
                    if (line.includes('SINOPSIS:')) synopsisText = line.replace('SINOPSIS:', '').trim();
                    else if (/^\d+\./.test(line.trim())) {
                        bookData.chapters.push({ title: line.replace(/^\d+\.\s*/, '').trim(), content: "Pendiente de redacción..." });
                    }
                });

                bookData.synopsis = synopsisText;
                bookData.prologue = "Pendiente...";
                bookData.epilogue = "Pendiente...";

                renderList();
                document.getElementById('bookPreview').classList.remove('hidden');
                document.getElementById('btnPlan').classList.add('hidden'); // Ocultar para evitar doble clic
                hideStatus();

            } catch (error) {
                showStatus("Error al planificar: " + error.message);
            }
        }

        // 3. Generar todo el texto secuencialmente
        async function generateAllText() {
            document.getElementById('btnGenText').classList.add('hidden');
            
            try {
                // Prólogo
                showStatus("Escribiendo el Prólogo...");
                bookData.prologue = await fetchGroq(`Escribe un prólogo cautivador para el libro "${bookData.title}" (${bookData.genre}). Mínimo 400 palabras.`);
                renderList();

                // Capítulos
                for (let i = 0; i < bookData.chapters.length; i++) {
                    showStatus(`Escribiendo Capítulo ${i+1}: ${bookData.chapters[i].title}...`);
                    bookData.chapters[i].content = await fetchGroq(`Escribe el capítulo completo "${bookData.chapters[i].title}" para el libro "${bookData.title}". Género: ${bookData.genre}. Sinopsis general: ${bookData.synopsis}. Escribe párrafos inmersivos, profundos y detallados. Mínimo 800 palabras.`);
                    renderList();
                }

                // Epílogo
                showStatus("Escribiendo el Epílogo...");
                bookData.epilogue = await fetchGroq(`Escribe un epílogo de cierre perfecto para el libro "${bookData.title}" (${bookData.genre}). Mínimo 400 palabras.`);
                
                hideStatus();
                document.getElementById('btnPDF').classList.remove('hidden');
                viewSection('prologue');

            } catch(e) {
                showStatus("Error durante la generación: " + e.message);
                document.getElementById('btnGenText').classList.remove('hidden');
            }
        }

        // 4. Interfaz de usuario interactiva
        function renderList() {
            const list = document.getElementById('chapterList');
            let html = `
                <div onclick="viewSection('synopsis')" class="p-3 bg-slate-100 rounded cursor-pointer hover:bg-slate-200 text-sm mb-1">Sinopsis Comercial</div>
                <div onclick="viewSection('prologue')" class="p-3 bg-slate-100 rounded cursor-pointer hover:bg-slate-200 text-sm mb-1">Prólogo ${bookData.prologue.includes('Pendiente') ? '⏳' : '✅'}</div>
            `;
            bookData.chapters.forEach((ch, i) => {
                html += `<div onclick="viewSection(${i})" class="p-3 bg-slate-100 rounded cursor-pointer hover:bg-slate-200 text-sm mb-1 truncate">Cap ${i+1}: ${ch.title} ${ch.content.includes('Pendiente') ? '⏳' : '✅'}</div>`;
            });
            html += `<div onclick="viewSection('epilogue')" class="p-3 bg-slate-100 rounded cursor-pointer hover:bg-slate-200 text-sm mb-1">Epílogo ${bookData.epilogue.includes('Pendiente') ? '⏳' : '✅'}</div>`;
            list.innerHTML = html;
        }

        function viewSection(type) {
            const t = document.getElementById('chapterTitle');
            const b = document.getElementById('chapterBody');
            
            // Remover listeners previos para evitar cruce de datos
            const newB = b.cloneNode(true);
            b.parentNode.replaceChild(newB, b);
            
            if (type === 'synopsis') {
                t.innerText = "Sinopsis (Contraportada)";
                newB.innerText = bookData.synopsis;
                newB.addEventListener('input', e => bookData.synopsis = e.target.innerText);
            } else if (type === 'prologue') {
                t.innerText = "Prólogo";
                newB.innerText = bookData.prologue;
                newB.addEventListener('input', e => bookData.prologue = e.target.innerText);
            } else if (type === 'epilogue') {
                t.innerText = "Epílogo";
                newB.innerText = bookData.epilogue;
                newB.addEventListener('input', e => bookData.epilogue = e.target.innerText);
            } else {
                t.innerText = bookData.chapters[type].title;
                newB.innerText = bookData.chapters[type].content;
                newB.addEventListener('input', e => bookData.chapters[type].content = e.target.innerText);
            }
        }

        // 5. El Motor de Imprenta (Maquetación Total)
        function downloadPDF() {
            if(!bookData.coverUrl) return alert("Debes subir una imagen de portada antes de exportar.");
            
            showStatus("Compilando arquitectura editorial para imprenta...");
            
            const doc = new jsPDF({ unit: 'mm', format: 'a5' });
            const pW = doc.internal.pageSize.getWidth();
            const pH = doc.internal.pageSize.getHeight();
            let pageNum = 1;

            const mTop = 22, mBot = 22, mInner = 24, mOuter = 16;
            const getM = (p) => ({ left: p % 2 !== 0 ? mInner : mOuter, right: p % 2 !== 0 ? mOuter : mInner, width: pW - mInner - mOuter });

            const printHeaderFooter = (p) => {
                const m = getM(p);
                doc.setFontSize(9); doc.setTextColor(120);
                doc.text(`${p}`, pW / 2, pH - 12, { align: 'center' }); // Pagina
                if (p > 8) { // Encabezados solo en el cuerpo del libro
                    doc.setFontSize(8);
                    if (p % 2 === 0) doc.text(bookData.author.toUpperCase(), m.left, 12);
                    else doc.text(bookData.title.toUpperCase(), pW - m.right, 12, {align: 'right'});
                }
            };

            const newPage = () => { doc.addPage(); pageNum++; };

            const writeText = (text, startY, isChapterTitle = false) => {
                doc.setTextColor(20); doc.setFont("times", "normal"); doc.setFontSize(11);
                let y = startY;
                const paras = text.split('\n').filter(p => p.trim());
                
                paras.forEach(para => {
                    const m = getM(pageNum);
                    const lines = doc.splitTextToSize(para.trim(), m.width);
                    lines.forEach(line => {
                        if (y > pH - mBot) {
                            printHeaderFooter(pageNum); newPage(); y = mTop; doc.setFont("times", "normal"); doc.setFontSize(11); doc.setTextColor(20);
                        }
                        doc.text(line, getM(pageNum).left, y, { align: 'justify', maxWidth: getM(pageNum).width });
                        y += 5.5;
                    });
                    y += 3;
                });
                printHeaderFooter(pageNum);
            };

            // Pág 1: Portada
            doc.addImage(bookData.coverUrl, 'JPEG', 0, 0, pW, pH);
            
            // Pág 2: Blanca
            newPage();

            // Pág 3: Portadilla
            newPage();
            doc.setFont("times", "bold"); doc.setFontSize(26);
            doc.text(doc.splitTextToSize(bookData.title.toUpperCase(), getM(pageNum).width), pW/2, pH/3, { align: 'center' });
            doc.setFontSize(14); doc.setFont("times", "normal");
            doc.text(bookData.author, pW/2, pH/2, { align: 'center' });
            
            // Pág 4: Legal
            newPage();
            doc.setFontSize(9); doc.setTextColor(80);
            doc.text(`© ${new Date().getFullYear()} ${bookData.author}`, getM(pageNum).left, pH - 70);
            doc.text(`ISBN: ${bookData.isbn}`, getM(pageNum).left, pH - 60);
            doc.text(`Género: ${bookData.genre}`, getM(pageNum).left, pH - 55);
            doc.text("Diseñado y maquetado con AI Book Studio Pro.", getM(pageNum).left, pH - 45);

            // Pág 5: Dedicatoria
            if(bookData.dedication) {
                newPage();
                doc.setFont("times", "italic"); doc.setFontSize(12); doc.setTextColor(0);
                doc.text(doc.splitTextToSize(bookData.dedication, getM(pageNum).width), pW/2, pH/2, { align: 'center' });
                newPage(); // Pág 6 blanca
            } else { newPage(); newPage(); }

            // Pág 7: Índice
            newPage();
            doc.setFont("times", "bold"); doc.setFontSize(16); doc.setTextColor(0);
            doc.text("ÍNDICE", getM(pageNum).left, 40);
            doc.setFont("times", "normal"); doc.setFontSize(12);
            let tocY = 60;
            doc.text("Prólogo", getM(pageNum).left, tocY); tocY += 10;
            bookData.chapters.forEach((ch, i) => { doc.text(`Capítulo ${i+1}: ${ch.title}`, getM(pageNum).left, tocY); tocY += 10; });
            doc.text("Epílogo", getM(pageNum).left, tocY);
            newPage(); // Pág 8 blanca

            // Prólogo
            newPage();
            doc.setFont("times", "bold"); doc.setFontSize(20); doc.text("Prólogo", getM(pageNum).left, 40);
            writeText(bookData.prologue, 60);
            if(pageNum % 2 !== 0) newPage(); // Forzar siguiente a impar

            // Capítulos
            bookData.chapters.forEach((ch, idx) => {
                if (pageNum % 2 === 0) { printHeaderFooter(pageNum); newPage(); }
                doc.setFont("times", "bold"); doc.setFontSize(22);
                doc.text(`Capítulo ${idx + 1}`, getM(pageNum).left, 45);
                doc.setFontSize(14); doc.setFont("times", "italic");
                doc.text(ch.title, getM(pageNum).left, 55);
                writeText(ch.content, 75);
            });

            // Epílogo
            if (pageNum % 2 === 0) { printHeaderFooter(pageNum); newPage(); }
            doc.setFont("times", "bold"); doc.setFontSize(20); doc.text("Epílogo", getM(pageNum).left, 40);
            writeText(bookData.epilogue, 60);

            // CONTRAPORTADA FINAL
            newPage();
            doc.setFillColor(30, 41, 59); // Fondo oscuro slate-800
            doc.rect(0, 0, pW, pH, 'F');
            doc.setTextColor(255);
            
            // Sinopsis en contraportada
            doc.setFont("times", "bold"); doc.setFontSize(16);
            doc.text(doc.splitTextToSize(bookData.title, pW - 40), pW/2, 40, { align: 'center' });
            doc.setFont("times", "normal"); doc.setFontSize(11);
            doc.text(doc.splitTextToSize(bookData.synopsis, pW - 40), pW/2, 60, { align: 'center' });
            
            // Bio en contraportada
            if(bookData.bio) {
                doc.setFont("times", "italic"); doc.setFontSize(10);
                doc.text(doc.splitTextToSize("Sobre el autor: " + bookData.bio, pW - 50), pW/2, 130, { align: 'center' });
            }

            // Código de Barras
            const barcodeDataUrl = document.getElementById('barcodeCanvas').src;
            if(barcodeDataUrl) {
                // Fondo blanco para el código de barras
                doc.setFillColor(255); doc.rect((pW/2) - 25, pH - 45, 50, 25, 'F');
                doc.addImage(barcodeDataUrl, 'PNG', (pW/2) - 22, pH - 42, 44, 18);
            }

            doc.save(`${bookData.title.replace(/\s+/g, '_')}_Editorial.pdf`);
            showStatus("¡Libro maquetado y descargado con éxito!");
            setTimeout(hideStatus, 4000);
        }

        function showStatus(text) {
            document.getElementById('statusMessage').classList.remove('hidden');
            document.getElementById('statusText').innerText = text;
        }
        function hideStatus() { document.getElementById('statusMessage').classList.add('hidden'); }
    </script>
</body>
</html>

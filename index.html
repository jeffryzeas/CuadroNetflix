<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Book Studio - Creador Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Inter:wght@300;400;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .book-font { font-family: 'Crimson Pro', serif; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .page-preview {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            background: white;
            min-height: 600px;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Encabezado -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">AI Book Studio</h1>
            <p class="text-slate-600">Escribe, ilustra y publica tu libro en segundos</p>
        </header>

        <!-- Formulario de Configuración -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Título del Libro</label>
                    <input type="text" id="bookTitle" placeholder="Ej: Las Crónicas del Tiempo Perdido" 
                           class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Género / Estilo</label>
                    <select id="bookGenre" class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="Novela Fantástica">Novela Fantástica</option>
                        <option value="Ciencia Ficción">Ciencia Ficción</option>
                        <option value="Autoayuda">Autoayuda</option>
                        <option value="Historia">Historia</option>
                        <option value="Poesía">Poesía</option>
                    </select>
                </div>
            </div>
            
            <div class="mt-6 flex flex-wrap gap-4">
                <button onclick="generateBookContent()" id="btnGenerate" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition flex items-center gap-2">
                    <span>Generar Contenido con IA</span>
                </button>
                <button onclick="generateCover()" id="btnCover" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-xl transition flex items-center gap-2 hidden">
                    <span>Generar Portada IA</span>
                </button>
                <button onclick="downloadPDF()" id="btnPDF" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-8 rounded-xl transition flex items-center gap-2 hidden">
                    <span>Descargar PDF</span>
                </button>
            </div>
        </div>

        <!-- Estado de Progreso -->
        <div id="statusMessage" class="hidden mb-6 p-4 rounded-lg bg-blue-50 text-blue-700 text-center font-medium border border-blue-100">
            <div class="loader mr-2"></div> <span id="statusText">Procesando...</span>
        </div>

        <!-- Editor y Vista Previa -->
        <div id="bookPreview" class="hidden">
            <div class="flex flex-col lg:flex-row gap-8">
                
                <!-- Columna Izquierda: Edición -->
                <div class="w-full lg:w-1/3 space-y-4">
                    <h3 class="font-bold text-slate-800 uppercase text-xs tracking-wider">Estructura del Libro</h3>
                    <div id="chapterList" class="space-y-2">
                        <!-- Capítulos se cargarán aquí -->
                    </div>
                </div>

                <!-- Columna Derecha: Vista Previa de Página -->
                <div class="w-full lg:w-2/3">
                    <div id="pdfContent" class="page-preview p-12 book-font text-slate-800 relative overflow-hidden">
                        <div id="coverView" class="w-full h-full flex flex-col items-center justify-center text-center">
                            <div id="coverImageContainer" class="w-full mb-8 rounded shadow-lg overflow-hidden bg-slate-100 min-h-[400px] flex items-center justify-center">
                                <span class="text-slate-400 italic">Sin portada generada</span>
                            </div>
                            <h1 id="previewTitle" class="text-5xl font-bold mb-4">Título del Libro</h1>
                            <p id="previewAuthor" class="text-xl italic text-slate-500">Por Autor IA</p>
                        </div>
                        
                        <div id="contentView" class="hidden">
                            <h2 id="chapterTitle" class="text-3xl font-bold mb-6 border-b pb-4">Capítulo 1</h2>
                            <div id="chapterBody" class="text-lg leading-relaxed whitespace-pre-wrap text-justify">
                                Selecciona un capítulo para editar o leer el contenido generado.
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // La plataforma inyectará la clave automáticamente
        let bookData = {
            title: "",
            author: "AI Author Studio",
            chapters: [],
            coverUrl: ""
        };

        const { jsPDF } = window.jspdf;

        async function fetchGemini(prompt, systemPrompt = "Eres un escritor de libros profesional.") {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (e) {
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
            throw new Error("No se pudo conectar con la IA después de varios intentos.");
        }

        async function generateBookContent() {
            const title = document.getElementById('bookTitle').value;
            const genre = document.getElementById('bookGenre').value;
            
            if (!title) {
                alert("Por favor, ingresa un título para el libro.");
                return;
            }

            showStatus("Creando el esquema de los capítulos...");
            bookData.title = title;
            document.getElementById('previewTitle').innerText = title;

            try {
                const schemaPrompt = `Genera un esquema de 5 capítulos para un libro titulado "${title}" del género "${genre}". Devuelve solo los nombres de los capítulos en una lista numerada.`;
                const schemaRaw = await fetchGemini(schemaPrompt);
                
                const lines = schemaRaw.split('\n').filter(l => l.match(/^\d/));
                bookData.chapters = lines.map(line => ({
                    title: line.replace(/^\d+\.\s*/, ''),
                    content: "Generando contenido..."
                }));

                renderChapters();
                document.getElementById('bookPreview').classList.remove('hidden');
                
                // Generar contenido del primer capítulo de inmediato
                await generateChapterContent(0);
                
                showStatus("¡Estructura lista! Ahora puedes generar la portada.");
                document.getElementById('btnCover').classList.remove('hidden');
                document.getElementById('btnPDF').classList.remove('hidden');

            } catch (error) {
                showStatus("Error: " + error.message);
            }
        }

        async function generateChapterContent(index) {
            showStatus(`Redactando ${bookData.chapters[index].title}...`);
            const prompt = `Escribe el contenido completo del capítulo titulado "${bookData.chapters[index].title}" para el libro "${bookData.title}". El estilo debe ser fluido y profesional. Mínimo 500 palabras.`;
            const content = await fetchGemini(prompt);
            bookData.chapters[index].content = content;
            selectChapter(index);
        }

        function renderChapters() {
            const list = document.getElementById('chapterList');
            list.innerHTML = `
                <div onclick="showCover()" class="p-3 bg-white border rounded-lg cursor-pointer hover:bg-blue-50 transition font-semibold text-blue-600">
                    Portada del Libro
                </div>
            `;
            bookData.chapters.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = "p-3 bg-white border rounded-lg cursor-pointer hover:bg-slate-50 transition text-sm flex justify-between items-center";
                div.innerHTML = `
                    <span class="truncate">${ch.title}</span>
                    <button onclick="event.stopPropagation(); generateChapterContent(${i})" class="text-xs text-blue-500 hover:underline">Regenerar</button>
                `;
                div.onclick = () => selectChapter(i);
                list.appendChild(div);
            });
        }

        function selectChapter(i) {
            document.getElementById('coverView').classList.add('hidden');
            document.getElementById('contentView').classList.remove('hidden');
            document.getElementById('chapterTitle').innerText = bookData.chapters[i].title;
            document.getElementById('chapterBody').innerText = bookData.chapters[i].content;
            hideStatus();
        }

        function showCover() {
            document.getElementById('coverView').classList.remove('hidden');
            document.getElementById('contentView').classList.add('hidden');
        }

        async function generateCover() {
            showStatus("Diseñando la portada con IA...");
            const prompt = `Una portada de libro profesional para una novela de ${document.getElementById('bookGenre').value} titulada "${bookData.title}". Estilo cinematográfico, artístico y detallado, sin texto, solo ilustración central.`;
            
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: [{ prompt: prompt }],
                        parameters: { sampleCount: 1 }
                    })
                });
                
                const result = await response.json();
                const base64 = result.predictions[0].bytesBase64Encoded;
                bookData.coverUrl = `data:image/png;base64,${base64}`;
                
                const container = document.getElementById('coverImageContainer');
                container.innerHTML = `<img src="${bookData.coverUrl}" class="w-full h-full object-cover">`;
                showCover();
                showStatus("¡Portada generada con éxito!");
            } catch (e) {
                showStatus("Error generando imagen. Inténtalo de nuevo.");
            }
        }

        async function downloadPDF() {
            showStatus("Preparando PDF... Esto puede tardar un momento.");
            const doc = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a4'
            });

            const margin = 20;
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();

            // 1. PORTADA
            if (bookData.coverUrl) {
                doc.addImage(bookData.coverUrl, 'PNG', 0, 0, pageWidth, pageHeight);
                doc.setFillColor(0, 0, 0, 0.4);
                doc.rect(0, pageHeight - 60, pageWidth, 60, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(26);
                doc.text(bookData.title.toUpperCase(), pageWidth / 2, pageHeight - 35, { align: 'center' });
                doc.setFontSize(14);
                doc.text(bookData.author, pageWidth / 2, pageHeight - 20, { align: 'center' });
            } else {
                doc.setFontSize(30);
                doc.text(bookData.title, pageWidth / 2, pageHeight / 3, { align: 'center' });
            }

            // 2. CAPÍTULOS
            for (let ch of bookData.chapters) {
                doc.addPage();
                doc.setTextColor(40, 40, 40);
                doc.setFontSize(22);
                doc.text(ch.title, margin, 40);
                doc.setDrawColor(200, 200, 200);
                doc.line(margin, 45, pageWidth - margin, 45);
                
                doc.setFontSize(12);
                const splitText = doc.splitTextToSize(ch.content, pageWidth - (margin * 2));
                
                let cursorY = 60;
                for (let line of splitText) {
                    if (cursorY > pageHeight - 20) {
                        doc.addPage();
                        cursorY = 25;
                    }
                    doc.text(line, margin, cursorY);
                    cursorY += 7;
                }
            }

            doc.save(`${bookData.title.replace(/\s+/g, '_')}.pdf`);
            showStatus("¡PDF descargado!");
            setTimeout(hideStatus, 2000);
        }

        function showStatus(text) {
            const banner = document.getElementById('statusMessage');
            const statusText = document.getElementById('statusText');
            banner.classList.remove('hidden');
            statusText.innerText = text;
        }

        function hideStatus() {
            document.getElementById('statusMessage').classList.add('hidden');
        }
    </script>
</body>
</html>

                <div class="text-[11px] text-white/30 uppercase tracking-[0.3em] font-black">
                    DÍA <span id="day-mini" class="text-white/70">--</span> / 365
                </div>
                <div id="timestamp" class="text-[8px] text-white/10 font-mono tracking-tight opacity-40 uppercase">
                    ID: NF-PRO-VERIFIED-DATA
                </div>
            </div>
            <div class="text-[#E50914] font-black text-5xl italic tracking-tighter scale-y-110 opacity-90">JZ</div>
        </div>
    </div>

    <!-- Panel de Navegación -->
    <div class="flex flex-wrap gap-5 mt-10 justify-center no-capture">
        <button id="generate-btn" class="btn-action px-10 py-4 rounded-sm text-white">
            Generar Otra
        </button>
        <button id="download-btn" class="btn-action px-10 py-4 rounded-sm text-white bg-white/5 border-white/10">
            Descargar Ultra HD
        </button>
    </div>

    <script>
        const GROQ_API_KEY = "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";
        const quoteText = document.getElementById('quote-text');
        const quoteAuthor = document.getElementById('quote-author');
        const dayLarge = document.getElementById('day-large');
        const dayMini = document.getElementById('day-mini');
        const timestamp = document.getElementById('timestamp');
        const loadingBar = document.getElementById('loading-bar');
        const generateBtn = document.getElementById('generate-btn');
        const downloadBtn = document.getElementById('download-btn');
        const fadeTarget = document.getElementById('fade-target');

        function getDayOfYear() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            return Math.floor((now - start) / (1000 * 60 * 60 * 24));
        }

        async function fetchWisdom() {
            loadingBar.style.width = "30%";
            generateBtn.disabled = true;
            generateBtn.style.opacity = "0.5";
            fadeTarget.style.opacity = "0.2";
            
            const day = getDayOfYear();
            dayLarge.innerText = day;
            dayMini.innerText = day;
            timestamp.innerText = `ID: NF-${Math.random().toString(36).substr(2, 9).toUpperCase()}-DAY${day}-ULTRA`;

            const systemPrompt = "Eres un maestro de sabiduría universal. Genera una frase de ánimos (máximo 10 palabras), poderosa y admirable con sabiduria la frase tiene que ser diferente a la ultima consulta. En español. Formato JSON: {\"q\": \"frase\", \"a\": \"autor\"}";
            const userPrompt = `Sabiduría perfecta para el día ${day}. No menciones el día en la frase.`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userPrompt }
                        ],
                        response_format: { type: "json_object" },
                        temperature: 0.85
                    })
                });

                loadingBar.style.width = "85%";
                const data = await response.json();
                const content = JSON.parse(data.choices[0].message.content);
                
                setTimeout(() => {
                    quoteText.innerText = `"${content.q}"`;
                    quoteAuthor.innerText = `— ${content.a}`;
                    fadeTarget.style.opacity = "1";
                    loadingBar.style.width = "100%";
                    setTimeout(() => loadingBar.style.width = "0%", 400);
                }, 300);

            } catch (e) {
                console.error(e);
                quoteText.innerText = "La paz comienza con una sonrisa.";
                quoteAuthor.innerText = "— Teresa de Calcuta";
            } finally {
                generateBtn.disabled = false;
                generateBtn.style.opacity = "1";
            }
        }

        async function downloadHD() {
            const container = document.getElementById('capture-container');
            const originalBtnText = downloadBtn.innerText;
            downloadBtn.innerText = "CAPTURANDO...";
            
            try {
                const canvas = await html2canvas(container, {
                    scale: 4, 
                    useCORS: true,
                    backgroundColor: "#050505",
                    letterRendering: true,
                    scrollX: 0,
                    scrollY: -window.scrollY
                });
                
                const link = document.createElement('a');
                link.download = `SABIDURIA_UNIVERSAL_DIA_${getDayOfYear()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            } catch (err) {
                console.error("Error en descarga:", err);
            } finally {
                downloadBtn.innerText = originalBtnText;
            }
        }

        generateBtn.addEventListener('click', fetchWisdom);
        downloadBtn.addEventListener('click', downloadHD);
        window.onload = fetchWisdom;
    </script>
</body>
</html>
